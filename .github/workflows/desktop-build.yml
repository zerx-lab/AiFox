# Manual desktop installer build.
#
# Trigger: `workflow_dispatch` only. Pick a version string in the GitHub UI
# (e.g. v0.2.0) and the workflow will:
#   1. Build the Go sidecar for the runner's OS/arch.
#   2. Run `task make` to produce installers via Electron Forge:
#        - linux   -> .deb              (out/make/deb/x64/*.deb)
#                  -> .rpm              (out/make/rpm/x64/*.rpm)
#                  -> AppImage          (out/make/AppImage/x64/*.AppImage)
#                  -> Arch package      (out/make/arch/*.pkg.tar.zst)
#        - windows -> Squirrel.Windows  (out/make/squirrel.windows/x64/*Setup.exe)
#      ZIPs are also produced as portable fallbacks.
#
#   The .deb/.rpm packages register the app in the desktop menu on install
#   (.desktop entry + hicolor icons + /usr/bin shim). The AppImage is a
#   portable single file with no system registration.
#   3. Upload each platform's `out/make/` tree as a workflow artifact.
#   4. Attach all artifacts to a freshly-created draft GitHub Release tagged
#      with the chosen version.
#
# Notes:
#   - Verify gate (`task verify`) is intentionally skipped here; this workflow
#     assumes the requester has already validated locally. The tagged
#     `release.yml` pipeline still gates GoReleaser on verify for the CLI.
#   - Cross-compilation is not attempted. Each OS builds its own installer
#     under its native runner; macOS is out of scope for now (no signing).
#   - The Arch package is built via `task build:arch` on the Linux runner,
#     which generates a PKGBUILD on the fly and calls makepkg. The runner is
#     ubuntu-latest so we bootstrap a minimal Arch environment using
#     arch-action, then delegate the actual makepkg call to that container.

name: desktop-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.2.0). A draft release will be created with this tag.'
        required: true
        type: string
      prerelease:
        description: 'Mark the draft release as a prerelease.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write # required to create the draft GitHub Release.

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          # Pin to windows-2022 (Server 2022) instead of windows-latest because
          # electron-winstaller's bundled Squirrel.exe shells out to 7z.exe and
          # fails on the windows-latest -> windows-2025 transition with
          # "The system cannot find the file specified". Revisit once
          # electron-winstaller ships a build that works on Server 2025.
          - os: windows-2022
            label: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # System deps:
      #   - rsvg-convert:  rendered by `task icons` (a `task make` dep).
      #   - mksquashfs:    required by @reforged/maker-appimage to assemble
      #                    the AppImage squashfs payload. Linux-only.
      #   - dpkg/fakeroot: electron-installer-debian (MakerDeb) shells out to
      #                    dpkg + fakeroot to assemble the .deb. fakeroot is
      #                    reused by `task build:arch` / makepkg below too.
      #   - rpm:           provides rpmbuild, required by electron-installer-
      #                    redhat (MakerRpm) to assemble the .rpm.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin squashfs-tools dpkg fakeroot rpm

      # Bootstrap a minimal Arch Linux environment so we can call `makepkg`.
      # We use `setup-archlinux` which runs an Arch container action; the Go
      # sidecar and Electron app are already built in the host environment, so
      # we only need the pacman package toolchain from the Arch side.
      # The action runs inside the existing ubuntu runner via Docker; all
      # subsequent steps tagged `if: runner.os == 'Linux'` still target Ubuntu.
      - name: Install Arch build tools (makepkg)
        if: runner.os == 'Linux'
        run: |
          # Install makepkg + fakeroot on Ubuntu by extracting them from the
          # Arch Linux bootstrap tarball — lightest approach that avoids Docker
          # layer overhead on the hosted runner.
          #
          # Alternative: `uses: athackst/setup-pacman` action, but that pulls
          # a full container. Here we just need the makepkg binary + fakeroot.
          sudo apt-get install -y fakeroot binutils file
          # Download and extract the latest Arch bootstrap (x86_64).
          BOOTSTRAP_URL="https://mirror.rackspace.com/archlinux/iso/latest/archlinux-bootstrap-x86_64.tar.zst"
          wget -q "$BOOTSTRAP_URL" -O /tmp/arch-bootstrap.tar.zst
          sudo mkdir -p /opt/arch-root
          sudo tar -I zstd -xf /tmp/arch-bootstrap.tar.zst \
            --strip-components=1 -C /opt/arch-root \
            root.x86_64/usr/bin/makepkg \
            root.x86_64/etc/makepkg.conf 2>/dev/null || true
          # If selective extract failed (tar layout differs), fall back to full
          # extract and copy just what we need.
          if [[ ! -f /opt/arch-root/usr/bin/makepkg ]]; then
            sudo tar -I zstd -xf /tmp/arch-bootstrap.tar.zst \
              --strip-components=1 -C /opt/arch-root root.x86_64/
          fi
          sudo install -m755 /opt/arch-root/usr/bin/makepkg /usr/local/bin/makepkg
          sudo install -m644 /opt/arch-root/etc/makepkg.conf /etc/makepkg.conf
          # Patch CARCH/CHOST in makepkg.conf to match x86_64 Ubuntu runner.
          sudo sed -i \
            -e 's|^CARCH=.*|CARCH="x86_64"|' \
            -e 's|^CHOST=.*|CHOST="x86_64-pc-linux-gnu"|' \
            -e 's|^PKGEXT=.*|PKGEXT=".pkg.tar.zst"|' \
            /etc/makepkg.conf
          rm -f /tmp/arch-bootstrap.tar.zst
          makepkg --version

      - name: Install Windows system deps
        if: runner.os == 'Windows'
        run: choco install -y --no-progress rsvg-convert

      - run: pnpm install --frozen-lockfile

      - name: task make
        run: task make

      # Build the Arch package. `task build:arch` calls scripts/make-arch.sh
      # which generates a PKGBUILD on the fly and runs makepkg. The task
      # depends on `task build`, which is already done by `task make` above
      # (both call `task build:go + codegen + typecheck + icons`). To avoid
      # rebuilding we call make-arch.sh directly after make has run, but
      # `task build:arch` is safe to re-run because build deps are cached.
      - name: task build:arch (Arch package)
        if: runner.os == 'Linux'
        run: task build:arch

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.label }}
          # Upload both Forge's out/make/ tree (AppImage, ZIP, Squirrel) and
          # the separately built Arch package.
          path: out/make/**/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Flatten the artifact tree so softprops/action-gh-release sees one file
      # per line. Forge's `out/make/` layout is deeply nested
      # (e.g. AppImage/x64/relay-0.1.0-x86_64.AppImage).
      - name: Collect release assets
        id: collect
        run: |
          mkdir -p release-assets
          find artifacts -type f \
            \( -iname '*.AppImage' -o -iname '*.pkg.tar.zst' \
               -o -iname '*.deb' -o -iname '*.rpm' \
               -o -iname '*Setup.exe' -o -iname '*.nupkg' \
               -o -iname 'RELEASES' -o -iname '*.zip' \) \
            -exec cp -v {} release-assets/ \;
          ls -la release-assets/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
