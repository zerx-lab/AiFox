components:
  schemas:
    Analysis:
      additionalProperties: false
      properties:
        anthropic:
          $ref: "#/components/schemas/AnthropicAnalysis"
        endpoint:
          description: Human-readable endpoint label
          type: string
        kind:
          description: Analyzer that produced this view
          type: string
        normalized:
          $ref: "#/components/schemas/NormalizedRequest"
        warnings:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - kind
        - endpoint
      type: object
    AnthropicAnalysis:
      additionalProperties: false
      properties:
        request:
          $ref: "#/components/schemas/AnthropicRequest"
        response:
          $ref: "#/components/schemas/AnthropicResponse"
      type: object
    AnthropicBlock:
      additionalProperties: false
      properties:
        cacheControl: {}
        content: {}
        id:
          type: string
        input: {}
        isError:
          type: boolean
        name:
          type: string
        raw: {}
        text:
          type: string
        toolUseId:
          type: string
        type:
          type: string
      required:
        - type
      type: object
    AnthropicError:
      additionalProperties: false
      properties:
        message:
          type: string
        type:
          type: string
      type: object
    AnthropicMessage:
      additionalProperties: false
      properties:
        content:
          items:
            $ref: "#/components/schemas/AnthropicBlock"
          type:
            - array
            - "null"
        role:
          type: string
      required:
        - role
        - content
      type: object
    AnthropicRequest:
      additionalProperties: false
      properties:
        maxTokens:
          format: int64
          type: integer
        messages:
          items:
            $ref: "#/components/schemas/AnthropicMessage"
          type:
            - array
            - "null"
        metadata: {}
        model:
          type: string
        stopSequences:
          items:
            type: string
          type:
            - array
            - "null"
        stream:
          type: boolean
        system:
          items:
            $ref: "#/components/schemas/AnthropicBlock"
          type:
            - array
            - "null"
        temperature:
          format: double
          type: number
        toolChoice: {}
        tools:
          items:
            $ref: "#/components/schemas/AnthropicTool"
          type:
            - array
            - "null"
        topK:
          format: int64
          type: integer
        topP:
          format: double
          type: number
        unknownFields:
          additionalProperties: {}
          type: object
      type: object
    AnthropicResponse:
      additionalProperties: false
      properties:
        content:
          items:
            $ref: "#/components/schemas/AnthropicBlock"
          type:
            - array
            - "null"
        error:
          $ref: "#/components/schemas/AnthropicError"
        id:
          type: string
        model:
          type: string
        role:
          type: string
        stopReason:
          type: string
        streamed:
          type: boolean
        usage:
          $ref: "#/components/schemas/AnthropicUsage"
      type: object
    AnthropicTool:
      additionalProperties: false
      properties:
        description:
          type: string
        inputSchema: {}
        name:
          type: string
        raw: {}
      required:
        - name
      type: object
    AnthropicUsage:
      additionalProperties: false
      properties:
        cacheCreationInputTokens:
          format: int64
          type: integer
        cacheReadInputTokens:
          format: int64
          type: integer
        inputTokens:
          format: int64
          type: integer
        outputTokens:
          format: int64
          type: integer
      type: object
    Breakpoint:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Breakpoint.json
          format: uri
          readOnly: true
          type: string
        enabled:
          type: boolean
        id:
          type: string
        match:
          description: How the pattern is matched.
          enum:
            - endpoint
            - path
          type: string
        pattern:
          description: Match pattern, e.g. "POST /v1/messages" or "/v1/messages".
          type: string
      required:
        - id
        - match
        - pattern
        - enabled
      type: object
    CreateBreakpointInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateBreakpointInputBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          type: boolean
        match:
          enum:
            - endpoint
            - path
          type: string
        pattern:
          minLength: 1
          type: string
      required:
        - match
        - pattern
        - enabled
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HeaderKVBody:
      additionalProperties: false
      properties:
        name:
          type: string
        value:
          type: string
      required:
        - name
        - value
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          description: Always 'ok' when the server is healthy.
          examples:
            - ok
          type: string
        time:
          description: Server time in RFC3339.
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    ListBreakpointsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListBreakpointsOutputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          items:
            $ref: "#/components/schemas/Breakpoint"
          type:
            - array
            - "null"
        paused:
          items:
            $ref: "#/components/schemas/Paused"
          type:
            - array
            - "null"
      required:
        - items
        - paused
      type: object
    ListSessionsOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListSessionsOutputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          items:
            $ref: "#/components/schemas/SessionSummaryBody"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ListTrafficOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListTrafficOutputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          items:
            $ref: "#/components/schemas/TrafficEntry"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    NormalizedMessage:
      additionalProperties: false
      properties:
        fingerprint:
          type: string
        role:
          type: string
      required:
        - role
        - fingerprint
      type: object
    NormalizedRequest:
      additionalProperties: false
      properties:
        messages:
          items:
            $ref: "#/components/schemas/NormalizedMessage"
          type:
            - array
            - "null"
        model:
          type: string
        provider:
          type: string
        system:
          type: string
      required:
        - provider
      type: object
    Paused:
      additionalProperties: false
      properties:
        breakpointId:
          type: string
        entryId:
          type: string
        method:
          type: string
        pausedAt:
          format: date-time
          type: string
        url:
          type: string
      required:
        - entryId
        - breakpointId
        - method
        - url
        - pausedAt
      type: object
    ProxyInfoOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ProxyInfoOutputBody.json
          format: uri
          readOnly: true
          type: string
        address:
          description: Loopback host:port the proxy listens on (stable across enable/disable)
          type: string
        baseUrl:
          description: Full http://host:port URL clients should point at
          type: string
        configured:
          description: True when upstreamBaseUrl is set
          type: boolean
        enabled:
          description: True when the listener is accepting connections
          type: boolean
        port:
          description: Fixed loopback port the proxy is configured to use
          format: int64
          type: integer
      required:
        - address
        - baseUrl
        - port
        - configured
        - enabled
      type: object
    ReplayInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ReplayInputBody.json
          format: uri
          readOnly: true
          type: string
        overrides:
          $ref: "#/components/schemas/ReplayOverridesBody"
      required:
        - overrides
      type: object
    ReplayOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ReplayOutputBody.json
          format: uri
          readOnly: true
          type: string
        entryId:
          description: ID of the newly captured entry.
          type: string
      required:
        - entryId
      type: object
    ReplayOverridesBody:
      additionalProperties: false
      properties:
        maxTokens:
          description: Override max output tokens.
          format: int64
          type: integer
        model:
          description: Override the upstream model identifier.
          type: string
        stream:
          description: Force streaming on / off.
          type: boolean
        temperature:
          description: Override sampling temperature.
          format: double
          type: number
        topK:
          description: Override top-k sampling.
          format: int64
          type: integer
        topP:
          description: Override nucleus sampling threshold.
          format: double
          type: number
      type: object
    SessionSummaryBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SessionSummaryBody.json
          format: uri
          readOnly: true
          type: string
        cacheCreate:
          format: int64
          type: integer
        cacheRead:
          format: int64
          type: integer
        entryIds:
          description: Captured traffic entries belonging to this session, oldest first.
          items:
            type: string
          type:
            - array
            - "null"
        fingerprint:
          description: Hash of the conversation anchor.
          type: string
        hasError:
          type: boolean
        hasStreaming:
          type: boolean
        hasUnfinished:
          type: boolean
        id:
          description: Opaque session ID.
          type: string
        inputTokens:
          format: int64
          type: integer
        lastAt:
          format: date-time
          type: string
        model:
          type: string
        outputTokens:
          format: int64
          type: integer
        provider:
          description: anthropic | openai | gemini
          type: string
        startedAt:
          format: date-time
          type: string
        status:
          enum:
            - active
            - completed
            - failed
          type: string
        turnCount:
          format: int64
          type: integer
      required:
        - id
        - fingerprint
        - provider
        - entryIds
        - startedAt
        - lastAt
        - turnCount
        - inputTokens
        - outputTokens
        - cacheRead
        - cacheCreate
        - status
        - hasError
        - hasStreaming
        - hasUnfinished
      type: object
    SetProxyEnabledInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SetProxyEnabledInputBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          description: Desired state of the proxy listener
          type: boolean
      required:
        - enabled
      type: object
    SettingsBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SettingsBody.json
          format: uri
          readOnly: true
          type: string
        authPreset:
          description: Picks the header shape used to authenticate upstream
          enum:
            - anthropic
            - openai
            - openai-responses
            - custom
          type: string
        customHeaders:
          description: User-defined headers injected on every forwarded request (only when authPreset=custom)
          items:
            $ref: "#/components/schemas/HeaderKVBody"
          type:
            - array
            - "null"
        language:
          description: UI language code; empty means follow OS
          enum:
            - ""
            - en
            - zh-CN
          type: string
        proxyEnabled:
          description: Whether the proxy listener should be running
          type: boolean
        proxyPort:
          description: Fixed loopback port the proxy binds to
          format: int64
          maximum: 65535
          minimum: 1
          type: integer
        theme:
          description: UI color scheme; empty means follow OS
          enum:
            - ""
            - dark
            - light
          type: string
        upstreamApiKey:
          description: API key forwarded to upstream (ignored when authPreset=custom)
          type: string
        upstreamBaseUrl:
          description: Upstream AI provider base URL, e.g. https://api.anthropic.com
          type: string
      required:
        - upstreamBaseUrl
        - upstreamApiKey
        - authPreset
        - customHeaders
        - proxyEnabled
        - proxyPort
        - language
        - theme
      type: object
    TrafficEntry:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TrafficEntry.json
          format: uri
          readOnly: true
          type: string
        analysis:
          $ref: "#/components/schemas/Analysis"
        durationMillis:
          format: int64
          type: integer
        endedAt:
          format: date-time
          type: string
        error:
          type: string
        id:
          type: string
        method:
          type: string
        replayedFromId:
          type: string
        requestBody:
          type: string
        requestHeaders:
          additionalProperties:
            type: string
          type: object
        requestSize:
          format: int64
          type: integer
        responseBody:
          type: string
        responseHeaders:
          additionalProperties:
            type: string
          type: object
        responseSize:
          format: int64
          type: integer
        sessionId:
          type: string
        startedAt:
          format: date-time
          type: string
        statusCode:
          format: int64
          type: integer
        streaming:
          type: boolean
        truncated:
          type: boolean
        upstreamUrl:
          type: string
        url:
          type: string
      required:
        - id
        - startedAt
        - endedAt
        - durationMillis
        - method
        - url
        - upstreamUrl
        - statusCode
        - requestHeaders
        - requestBody
        - requestSize
        - responseHeaders
        - responseBody
        - responseSize
        - streaming
        - truncated
      type: object
    UpdateBreakpointInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateBreakpointInputBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          type: boolean
      required:
        - enabled
      type: object
info:
  description: HTTP API exposed by the Go backend to the Electron renderer.
  title: Ai-fox API
  version: 0.3.0
openapi: 3.1.0
paths:
  /health:
    get:
      description: Returns ok when the Go backend is reachable.
      operationId: get-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Health probe
      tags:
        - system
  /v1/breakpoints:
    get:
      operationId: list-breakpoints
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBreakpointsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List configured breakpoints and currently-paused requests.
      tags:
        - breakpoints
    post:
      operationId: create-breakpoint
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBreakpointInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Breakpoint"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Add a breakpoint.
      tags:
        - breakpoints
  /v1/breakpoints/paused/{entryId}/abort:
    post:
      operationId: abort-paused
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            maxLength: 64
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Drop a paused request — client receives 503.
      tags:
        - breakpoints
  /v1/breakpoints/paused/{entryId}/continue:
    post:
      operationId: continue-paused
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            maxLength: 64
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Resume a paused request — forward it upstream.
      tags:
        - breakpoints
  /v1/breakpoints/{id}:
    delete:
      operationId: delete-breakpoint
      parameters:
        - in: path
          name: id
          required: true
          schema:
            maxLength: 64
            type: string
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Delete a breakpoint (and continue any held request).
      tags:
        - breakpoints
    put:
      operationId: update-breakpoint
      parameters:
        - in: path
          name: id
          required: true
          schema:
            maxLength: 64
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBreakpointInputBody"
        required: true
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Enable / disable a breakpoint.
      tags:
        - breakpoints
  /v1/proxy:
    get:
      operationId: get-proxy-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyInfoOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Proxy address and configuration status
      tags:
        - proxy
    put:
      operationId: set-proxy-enabled
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProxyEnabledInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyInfoOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Start or stop the proxy listener
      tags:
        - proxy
  /v1/sessions:
    get:
      operationId: list-sessions
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSessionsOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List aggregated sessions, newest first.
      tags:
        - sessions
  /v1/sessions/{id}:
    get:
      operationId: get-session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            maxLength: 64
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSummaryBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Fetch one session by id.
      tags:
        - sessions
  /v1/settings:
    get:
      operationId: get-settings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Read persisted user settings
      tags:
        - settings
    put:
      operationId: put-settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Replace persisted user settings
      tags:
        - settings
  /v1/traffic:
    delete:
      operationId: clear-traffic
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Discard every captured entry
      tags:
        - traffic
    get:
      operationId: list-traffic
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTrafficOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List captured proxy traffic (newest first)
      tags:
        - traffic
  /v1/traffic/stream:
    get:
      operationId: stream-traffic
      responses:
        "200":
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Server-sent events stream of new and updated entries
      tags:
        - traffic
  /v1/traffic/{id}:
    get:
      operationId: get-traffic
      parameters:
        - in: path
          name: id
          required: true
          schema:
            maxLength: 64
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficEntry"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
