components:
  schemas:
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    HeaderKVBody:
      additionalProperties: false
      properties:
        name:
          type: string
        value:
          type: string
      required:
        - name
        - value
      type: object
    HealthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/HealthOutputBody.json
          format: uri
          readOnly: true
          type: string
        status:
          description: Always 'ok' when the server is healthy.
          examples:
            - ok
          type: string
        time:
          description: Server time in RFC3339.
          format: date-time
          type: string
      required:
        - status
        - time
      type: object
    ListTrafficOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ListTrafficOutputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          items:
            $ref: "#/components/schemas/TrafficEntry"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    ProxyInfoOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ProxyInfoOutputBody.json
          format: uri
          readOnly: true
          type: string
        address:
          description: Loopback host:port the proxy listens on (or last-bound when stopped)
          type: string
        baseUrl:
          description: Full http://host:port URL clients should point at
          type: string
        configured:
          description: True when upstreamBaseUrl is set
          type: boolean
        enabled:
          description: True when the listener is accepting connections
          type: boolean
      required:
        - address
        - baseUrl
        - configured
        - enabled
      type: object
    SetProxyEnabledInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SetProxyEnabledInputBody.json
          format: uri
          readOnly: true
          type: string
        enabled:
          description: Desired state of the proxy listener
          type: boolean
      required:
        - enabled
      type: object
    SettingsBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SettingsBody.json
          format: uri
          readOnly: true
          type: string
        authPreset:
          description: Picks the header shape used to authenticate upstream
          enum:
            - anthropic
            - openai
            - openai-responses
            - custom
          type: string
        customHeaders:
          description: User-defined headers injected on every forwarded request (only when authPreset=custom)
          items:
            $ref: "#/components/schemas/HeaderKVBody"
          type:
            - array
            - "null"
        language:
          description: UI language code; empty means follow OS
          enum:
            - ""
            - en
            - zh-CN
          type: string
        proxyEnabled:
          description: Whether the proxy listener should be running
          type: boolean
        theme:
          description: UI color scheme; empty means follow OS
          enum:
            - ""
            - dark
            - light
          type: string
        upstreamApiKey:
          description: API key forwarded to upstream (ignored when authPreset=custom)
          type: string
        upstreamBaseUrl:
          description: Upstream AI provider base URL, e.g. https://api.anthropic.com
          type: string
      required:
        - upstreamBaseUrl
        - upstreamApiKey
        - authPreset
        - customHeaders
        - proxyEnabled
        - language
        - theme
      type: object
    TrafficEntry:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/TrafficEntry.json
          format: uri
          readOnly: true
          type: string
        durationMillis:
          format: int64
          type: integer
        endedAt:
          format: date-time
          type: string
        error:
          type: string
        id:
          type: string
        method:
          type: string
        requestBody:
          type: string
        requestHeaders:
          additionalProperties:
            type: string
          type: object
        requestSize:
          format: int64
          type: integer
        responseBody:
          type: string
        responseHeaders:
          additionalProperties:
            type: string
          type: object
        responseSize:
          format: int64
          type: integer
        startedAt:
          format: date-time
          type: string
        statusCode:
          format: int64
          type: integer
        streaming:
          type: boolean
        truncated:
          type: boolean
        upstreamUrl:
          type: string
        url:
          type: string
      required:
        - id
        - startedAt
        - endedAt
        - durationMillis
        - method
        - url
        - upstreamUrl
        - statusCode
        - requestHeaders
        - requestBody
        - requestSize
        - responseHeaders
        - responseBody
        - responseSize
        - streaming
        - truncated
      type: object
info:
  description: HTTP API exposed by the Go backend to the Electron renderer.
  title: Ai-fox API
  version: 0.3.0
openapi: 3.1.0
paths:
  /health:
    get:
      description: Returns ok when the Go backend is reachable.
      operationId: get-health
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Health probe
      tags:
        - system
  /v1/proxy:
    get:
      operationId: get-proxy-info
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyInfoOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Proxy address and configuration status
      tags:
        - proxy
    put:
      operationId: set-proxy-enabled
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProxyEnabledInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyInfoOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Start or stop the proxy listener
      tags:
        - proxy
  /v1/settings:
    get:
      operationId: get-settings
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Read persisted user settings
      tags:
        - settings
    put:
      operationId: put-settings
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Replace persisted user settings
      tags:
        - settings
  /v1/traffic:
    delete:
      operationId: clear-traffic
      responses:
        "204":
          description: No Content
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Discard every captured entry
      tags:
        - traffic
    get:
      operationId: list-traffic
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTrafficOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List captured proxy traffic (newest first)
      tags:
        - traffic
  /v1/traffic/stream:
    get:
      operationId: stream-traffic
      responses:
        "200":
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Server-sent events stream of new and updated entries
      tags:
        - traffic
  /v1/traffic/{id}:
    get:
      operationId: get-traffic
      parameters:
        - in: path
          name: id
          required: true
          schema:
            maxLength: 64
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficEntry"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Fetch a single captured entry by id
      tags:
        - traffic
